<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2F6BFF"/>
      <stop offset="1" stop-color="#1D3FB8"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect width="512" height="512" rx="104" fill="url(#tile)"/>

  <!-- Industrial hexagon (manufacturing) -->
  <path d="M406 256 L331 385.9 L181 385.9 L106 256 L181 126.1 L331 126.1 Z"
        fill="none" stroke="#FFFFFF" stroke-width="30"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Automation / connection network inside -->
  <g stroke="#FFFFFF" stroke-width="20" stroke-linecap="round">
    <line x1="256" y1="190" x2="198" y2="300"/>
    <line x1="256" y1="190" x2="314" y2="300"/>
    <line x1="198" y1="300" x2="314" y2="300"/>
  </g>
  <g fill="#FFFFFF">
    <circle cx="256" cy="190" r="30"/>
    <circle cx="198" cy="300" r="30"/>
    <circle cx="314" cy="300" r="30"/>
  </g>
  <!-- accent hub dots -->
  <circle cx="256" cy="190" r="13" fill="#2F6BFF"/>
  <circle cx="198" cy="300" r="13" fill="#2F6BFF"/>
  <circle cx="314" cy="300" r="13" fill="#2F6BFF"/>
</svg>
